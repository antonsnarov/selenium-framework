# ===========================
# Browser Configuration
# ===========================
# Supported: chrome, firefox
browser=chrome

# Run headless (без открытия браузера — нужно для CI/Docker)
headless=false

# Selenium Grid URL (используется когда remote=true)
remote=false
grid.url=http://localhost:4444/wd/hub

# ===========================
# Application
# ===========================
base.url=https://www.saucedemo.com

# ===========================
# Timeouts (seconds)
# ===========================
implicit.wait=10
explicit.wait=15
page.load.timeout=30

# ===========================
# Test Users (saucedemo)
# ===========================
user.standard=standard_user
user.locked=locked_out_user
user.problem=problem_user
password=secret_sauce
